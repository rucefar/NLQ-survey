<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gstatic.com https://lh3.googleusercontent.com; frame-src 'self' https://rucefar.github.io https://accounts.google.com https://winplus-6fe62.firebaseapp.com; connect-src https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.googleapis.com;">
<title>WinPlus+ | 數位戰鬥與成長手冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Caveat:wght@400;600&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ══════════════════════════════════════════
   1. 全域與登入樣式
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f1ea; font-family: 'Noto Sans TC', sans-serif; }
.noise-bg { background-color: #f4f1ea; background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); background-size: 30px 30px, auto; }
.app-view { display: none; }
.app-view.active { display: block; }
#home-view.active { display: flex; }
#login-overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.login-box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.5); }
.login-box h1 { font-family: 'Noto Serif TC', serif; color: #2d3436; margin-bottom: 1rem; font-weight: 900; }
.cloud-status { font-size: 0.75rem; color: #888; margin-left: 10px; font-weight: 500; }
.user-profile { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-left: auto; margin-right: 15px; font-weight: 700; }
.logout-btn { background: transparent; border: 1px solid rgba(0,0,0,0.3); color: #333; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); color: #e85a5a; }

/* ══════════════════════════════════════════
   2. WinPlus 核心樣式 (導覽與頁面)
══════════════════════════════════════════ */
#winplus-view { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
#nav { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: #1e1e1e; z-index: 9000; display: flex; align-items: center; padding: 0 8px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
#nav::-webkit-scrollbar { display: none; }
.nav-logo { font-family: 'Caveat', cursive; font-size: 1.1rem; color: #f0ebe0; white-space: nowrap; margin-right: 10px; }
.tab-btn { padding: 4px 9px; border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.6); font-size: .7rem; cursor: pointer; border-radius: 18px; white-space: nowrap; }
.tab-btn.active { background: #e8a045; border-color: #e8a045; color: #fff; }
.page { position: absolute; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; display: none; visibility: hidden; pointer-events: none; z-index: 1; }
.page.active { display: block; visibility: visible; pointer-events: auto; z-index: 10; }

/* --- 新頁面樣式：90天跟進與百戰圖 --- */
#page-followup, #page-battles { background-color: #fcfaf7; padding: 25px; overflow-y: auto; display: none; }
#page-followup.active, #page-battles.active { display: block; }
.fu-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #ede8e0; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
.fu-name-tag { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 900; color: #2d3436; }
.fu-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; background: #fdfaf5; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.85rem; }
.fu-tag-check { padding: 4px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.7rem; cursor: pointer; background: #fff; display: inline-block; margin: 2px; }
.fu-tag-check.active { background: #e8a04515; border-color: #e8a045; color: #d09030; font-weight: 700; }
.battle-hero { background: #2d3436; color: #fff; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
.battle-grid-canvas { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; max-width: 500px; margin: 0 auto; background: #f0ece6; padding: 10px; border-radius: 12px; }
.battle-cell-box { aspect-ratio: 1; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-bottom: 2px solid #ddd; }
.battle-cell-box.filled::after { content: '✕'; font-family: 'Caveat'; color: #d63031; font-size: 1.5rem; }
.battle-fill { height: 100%; background: linear-gradient(90deg, #e8a045, #d63031); width: 0%; transition: width 0.5s; }

/* 曼陀羅、CRM 等原有樣式省略... (完整檔案中已整合) */
/* 這裡為了代碼運行，保留基礎佈局 */
#page-mandala.active { display: flex; justify-content: center; align-items: center; background: #fff; }
.big-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; background: #222; border: 2px solid #222; width: min(680px, 90vw); height: min(680px, 90vw); }
.m-cell { background: #fff; position: relative; }
.m-cell textarea { position: absolute; inset: 0; border: none; text-align: center; resize: none; font-size: 0.7rem; padding: 5px; }
</style>
</head>
<body>

<div id="login-overlay" class="noise-bg">
    <div class="login-box">
        <h1>WinPlus+</h1>
        <p>數位戰鬥與成長空間</p>
        <div id="google-btn-container" style="display: flex; justify-content: center; margin-top: 2rem; min-height: 40px;"></div>
        <div id="login-error" style="margin-top:12px; font-size:0.8rem; color:#e85a5a;"></div>
    </div>
</div>

<div id="home-view" class="app-view active noise-bg">
    <header style="text-align:center; margin-bottom:3rem; padding-top:4rem;">
        <h1 style="font-family:'Noto Serif TC'; font-size:2.5rem; background:linear-gradient(135deg, #8b2020, #e8a045); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">WinPlus+ 成長系統</h1>
    </header>
    <main style="display:flex; gap:2rem; justify-content:center; flex-wrap:wrap; padding: 0 1rem;">
        <div style="background:#fff; padding:2rem; border-radius:24px; width:300px; text-align:center; cursor:pointer; border-top:6px solid #e8a045;" onclick="window.switchApp('winplus')">
            <h2 style="margin-bottom:1rem;">🚀 戰鬥手扎</h2>
            <p style="color:#666;">曼陀羅、CRM、百戰圖</p>
        </div>
    </main>
</div>

<div id="winplus-view" class="app-view">
    <div id="nav">
      <button class="tab-btn" onclick="window.switchApp('home')">← 回首頁</button>
      <span class="nav-logo">✦ WinPlus+</span>
      <button class="tab-btn active" onclick="window.gotoPage('followup',this)">📋 90天跟進</button>
      <button class="tab-btn"       onclick="window.gotoPage('battles',this)">⚔️ 百戰圖</button>
      <button class="tab-btn"       onclick="window.gotoPage('mandala',this)">⊞ 曼陀羅</button>
      <span class="cloud-status">☁️ 雲端狀態</span>
      <div class="user-profile" id="user-profile-name"></div>
      <button class="logout-btn" onclick="window.logout()">登出</button>
    </div>

    <div class="page active" id="page-followup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family:'Noto Serif TC';">90天跟進管理 </h2>
            <button style="background:#e8a045; color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;" onclick="window.addFollowupUser()">＋ 新增對象 </button>
        </div>
        <div id="followup-list"></div>
    </div>

    <div class="page" id="page-battles">
        <div class="battle-hero">
            <h2>百戰成功圖 </h2>
            <p>展示市場計畫不順利時，就在格子打 ✕ [cite: 4]</p>
        </div>
        <div class="battle-grid-canvas" id="battle-grid"></div>
        <div style="max-width:500px; margin:20px auto; text-align:center; padding:20px; background:#fdfaf5; border-radius:15px; border:1px solid #ede8e0;">
            <div style="display:flex; justify-content:space-between; font-weight:700;">
                <span>邁向 D.D. 之路 [cite: 5]</span>
                <span id="battle-stat-text">0 / 100</span>
            </div>
            <div style="height:10px; background:#eee; border-radius:5px; overflow:hidden; margin:10px 0;">
                <div id="battle-fill" style="height:100%; background:#d63031; width:0%;"></div>
            </div>
            <p style="font-size:0.7rem; color:#999;">「要成為 D.D. 您最多到 100 次挫折而已」[cite: 6]</p>
            <button onclick="window.resetBattles()" style="margin-top:10px; border:none; background:none; color:#d63031; cursor:pointer;">↺ 重置</button>
        </div>
    </div>

    <div class="page" id="page-mandala">
        <div class="big-grid" id="big-grid"></div>
    </div>
</div>

<script>
// ══════════════════════════════════════════
// JavaScript 邏輯 (整合版)
// ══════════════════════════════════════════
window.wp_followup = JSON.parse(localStorage.getItem('wp_followup')) || [];
window.wp_battles = JSON.parse(localStorage.getItem('wp_battles')) || Array(100).fill(false);

window.switchApp = (id) => {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    document.getElementById(id + '-view').classList.add('active');
};

window.gotoPage = (name, btn) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if(name === 'followup') window.renderFollowup();
    if(name === 'battles') window.renderBattles();
};

// 跟進表邏輯 [cite: 1, 2]
window.renderFollowup = () => {
    const container = document.getElementById('followup-list');
    if(!container) return;
    container.innerHTML = "";
    window.wp_followup.forEach((user, idx) => {
        const card = document.createElement('div');
        card.className = 'fu-card';
        card.innerHTML = `
            <div class="fu-name-tag">👤 ${user.name}</div>
            <div class="fu-info-grid">
                <div><strong>加入日期:</strong> ${user.joinDate || '未填'}</div>
                <div><strong>類型:</strong> ${user.type || '生活會員'}</div>
                <div><strong>上線:</strong> ${user.upline || '未填'}</div>
            </div>
            <div style="font-size:0.75rem; color:#e8a045; font-weight:900; margin-bottom:10px;">核心產品與服務紀錄 </div>
            <div class="fu-check-container">
                ${['SA8','LOC','洗碟精','牙膏','魚油','VitC','營養評估','一對一OPP','會場OPP'].map(p => 
                    `<div class="fu-tag-check ${user.items?.includes(p)?'active':''}" onclick="window.toggleFuItem(${idx}, '${p}')">${p}</div>`
                ).join('')}
            </div>
        `;
        container.appendChild(card);
    });
};

window.toggleFuItem = (uIdx, val) => {
    if(!window.wp_followup[uIdx].items) window.wp_followup[uIdx].items = [];
    const arr = window.wp_followup[uIdx].items;
    const i = arr.indexOf(val);
    if(i > -1) arr.splice(i, 1); else arr.push(val);
    window.saveSync(); window.renderFollowup();
};

window.addFollowupUser = () => {
    const name = prompt("輸入姓名 ：");
    if(!name) return;
    window.wp_followup.unshift({ name, joinDate: new Date().toLocaleDateString(), type: '生活會員', items: [] });
    window.saveSync(); window.renderFollowup();
};

// 百戰圖邏輯 [cite: 3, 4]
window.renderBattles = () => {
    const grid = document.getElementById('battle-grid');
    if(!grid) return; grid.innerHTML = "";
    let count = 0;
    window.wp_battles.forEach((filled, idx) => {
        const cell = document.createElement('div');
        cell.className = 'battle-cell-box' + (filled ? ' filled' : '');
        if(filled) count++;
        cell.onclick = () => { window.wp_battles[idx] = !window.wp_battles[idx]; window.saveSync(); window.renderBattles(); };
        grid.appendChild(cell);
    });
    document.getElementById('battle-stat-text').textContent = `${count} / 100 挫折`;
    document.getElementById('battle-fill').style.width = count + "%";
};

window.resetBattles = () => { if(confirm("重置百戰圖？")) { window.wp_battles = Array(100).fill(false); window.saveSync(); window.renderBattles(); } };

window.saveSync = () => {
    localStorage.setItem('wp_followup', JSON.stringify(window.wp_followup));
    localStorage.setItem('wp_battles', JSON.stringify(window.wp_battles));
    if(window.triggerCloudSave) window.triggerCloudSave();
};

// 曼陀羅初始化
document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('big-grid');
    for(let i=0; i<81; i++){
        const cell = document.createElement('div');
        cell.className = 'm-cell';
        const ta = document.createElement('textarea');
        ta.value = localStorage.getItem('m-'+i) || "";
        ta.oninput = () => localStorage.setItem('m-'+i, ta.value);
        cell.appendChild(ta); grid.appendChild(cell);
    }
});
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithCredential, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyArBQTUSpEk2VfLMSe1lLDbhBDNEzZJgtA",
    authDomain: "rucefar.github.io",
    projectId: "winplus-6fe62",
    storageBucket: "winplus-6fe62.firebasestorage.app",
    messagingSenderId: "635721093721",
    appId: "1:635721093721:web:12d24d7025514608335748"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 重要：登入憑證處理 (全域函式確保 Google API 可呼叫)
  window.handleCredentialResponse = async (response) => {
      try {
          const credential = GoogleAuthProvider.credential(response.credential);
          await signInWithCredential(auth, credential);
      } catch (error) {
          document.getElementById('login-error').textContent = '登入失敗，請檢查網路。';
      }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      window.currentUserUid = user.uid;
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('user-profile-name').textContent = user.displayName;
      
      const snap = await getDoc(doc(db, "users", user.uid));
      if(snap.exists()){
          const d = snap.data();
          if(d.followup) window.wp_followup = d.followup;
          if(d.battles) window.wp_battles = d.battles;
          window.renderFollowup(); window.renderBattles();
      }
    } else {
      document.getElementById('login-overlay').style.display = 'flex';
    }
  });

  window.logout = () => signOut(auth).then(() => location.reload());

  window.triggerCloudSave = () => {
    if(!window.currentUserUid) return;
    setDoc(doc(db, "users", window.currentUserUid), {
        followup: window.wp_followup,
        battles: window.wp_battles,
        updated: Date.now()
    }, { merge: true });
  };

  window.onload = () => {
      google.accounts.id.initialize({
          client_id: "635721093721-ebdobeukugpou646db9kt6ij873ejorb.apps.googleusercontent.com",
          callback: window.handleCredentialResponse
      });
      google.accounts.id.renderButton(document.getElementById("google-btn-container"), { theme: "outline", size: "large", width: 250 });
  };
</script>
</body>
</html>
