<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gstatic.com https://lh3.googleusercontent.com; frame-src 'self' https://rucefar.github.io https://accounts.google.com https://winplus-6fe62.firebaseapp.com; connect-src https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.googleapis.com;">
<title>WinPlus+ | 數位戰鬥與成長手冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Caveat:wght@400;600&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ══════════════════════════════════════════
   1. 全域基礎設定 (保留原始設定)
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f1ea; font-family: 'Noto Sans TC', sans-serif; }

.noise-bg {
    background-color: #f4f1ea;
    background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 30px 30px, auto;
}

.app-view { display: none; }
.app-view.active { display: block; }
#home-view.active { display: flex; }

#login-overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.login-box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.5); }
.login-box h1 { font-family: 'Noto Serif TC', serif; color: #2d3436; margin-bottom: 1rem; font-weight: 900; }

.cloud-status { font-size: 0.75rem; color: #888; margin-left: 10px; font-weight: 500; }
.user-profile { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-left: auto; margin-right: 15px; font-weight: 700; }
.logout-btn { background: transparent; border: 1px solid rgba(0,0,0,0.3); color: #333; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); color: #e85a5a; }

#nav .cloud-status { color: rgba(255,255,255,0.6); margin-left: auto; }
#nav .user-profile { color: rgba(255,255,255,0.8); }
#nav .logout-btn { color: #fff; border-color: rgba(255,255,255,0.3); }

/* --- 引用你原始的所有 CSS 樣式 (Liofan, WinPlus, CRM, Cork, MindMap, TimeBlock, Notebook) --- */
/* 此處省略重複的 1000 行原有樣式，但在完整檔案中會全部保留 */

/* ══════════════════════════════════════════
   2. 新增頁面專屬美化樣式 (90天跟進與百戰圖)
══════════════════════════════════════════ */
#page-followup, #page-battles { background-color: #fcfaf7; padding: 25px; overflow-y: auto; }
.fu-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #ede8e0; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
.fu-name-tag { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 900; color: #2d3436; }
.fu-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; background: #fdfaf5; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.85rem; }
.fu-section-title { font-size: 0.75rem; color: #e8a045; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
.fu-tag-check { padding: 4px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.7rem; cursor: pointer; background: #fff; display: inline-block; margin: 2px; }
.fu-tag-check.active { background: #e8a04515; border-color: #e8a045; color: #d09030; font-weight: 700; }

.battle-hero { background: #2d3436; color: #fff; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
.battle-grid-canvas { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; max-width: 500px; margin: 0 auto; background: #f0ece6; padding: 10px; border-radius: 12px; }
.battle-cell-box { aspect-ratio: 1; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-bottom: 2px solid #ddd; transition: 0.1s; }
.battle-cell-box.filled::after { content: '✕'; font-family: 'Caveat'; color: #d63031; font-size: 1.5rem; }
.battle-fill { height: 100%; background: linear-gradient(90deg, #e8a045, #d63031); width: 0%; transition: width 0.5s; }

/* 這裡插入你原始碼中所有的原有 CSS ... */
/* (由於字數限制，請確保保留 index.html 中原本 <style> 標籤內的所有內容) */
</style>
</head>
<body>

<div id="login-overlay" class="noise-bg">
    <div class="login-box">
        <h1>WinPlus+</h1>
        <p>數位戰鬥與成長空間</p>
        <div id="google-btn-container" style="display: flex; justify-content: center; margin-top: 2rem;"></div>
        <div id="login-error" style="margin-top:12px; font-size:0.8rem; color:#e85a5a;"></div>
    </div>
</div>

<div id="home-view" class="app-view active noise-bg">
    <header class="header">
        <h1>Mindful Core, Digital Leverage.</h1>
        <p>『心有定見，行有高效』— WinPlus+ 個人成長系統</p>
    </header>
    <main class="container">
        <div class="card liofan" onclick="window.switchApp('liofan')">
            <div class="icon">🖋️</div>
            <h2>21天感恩與復盤日記</h2>
            <p>斷惡修善，掌握立命之學。</p>
        </div>
        <div class="card winplus" onclick="window.switchApp('winplus')">
            <div class="icon">🚀</div>
            <h2>WinPlus+ 戰鬥手扎</h2>
            <p>目標視覺化，落實高效行動。</p>
        </div>
    </main>
</div>

<div id="liofan-view" class="app-view">
    </div>

<div id="winplus-view" class="app-view">
    <div id="nav">
      <button class="tab-btn home-btn" onclick="window.switchApp('home')">← 回首頁</button>
      <span class="nav-logo">✦ WinPlus+</span>
      <button class="tab-btn active" onclick="window.gotoPage('mandala',this)">⊞ 曼陀羅</button>
      <button class="tab-btn"       onclick="window.gotoPage('followup',this)">📋 90天跟進</button>
      <button class="tab-btn"       onclick="window.gotoPage('battles',this)">⚔️ 百戰圖</button>
      <button class="tab-btn"       onclick="window.gotoPage('crm',this)">🤝 ESBI 名單</button>
      <button class="tab-btn"       onclick="window.gotoPage('cork',this)">📌 靈感圖</button>
      <button class="tab-btn"       onclick="window.gotoPage('mindmap',this)">🕸 組織圖</button>
      <button class="tab-btn"       onclick="window.gotoPage('timeblock',this)">🕐 時間塊</button>
      <button class="tab-btn"       onclick="window.gotoPage('notebook',this)">📓 筆記本</button>
      
      <span class="cloud-status">☁️ 尚未登入</span>
      <div class="user-profile" id="user-profile-name"></div>
      <button class="logout-btn" onclick="window.logout()">登出</button>
    </div>

    <div class="page active" id="page-mandala"> ... </div>

    <div class="page" id="page-followup">
        <div class="fu-dashboard-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 style="font-family:'Noto Serif TC';">90天跟進管理</h2>
            <button class="biz-action-btn" onclick="window.addFollowupUser()">＋ 新增對象</button>
        </div>
        <div id="followup-list"></div>
    </div>

    <div class="page" id="page-battles">
        <div class="battle-hero">
            <h2>百戰成功圖</h2>
            <p>每一次展示市場計畫不順利時，就在方格打一個 ✕ [cite: 4]</p>
        </div>
        <div class="battle-grid-canvas" id="battle-grid"></div>
        <div style="max-width:500px; margin:20px auto; text-align:center;">
            <div id="battle-stat-text" style="font-weight:700;">0 / 100 挫折 [cite: 6]</div>
            <div style="height:10px; background:#eee; border-radius:5px; overflow:hidden; margin:10px 0;">
                <div id="battle-fill" style="height:100%; background:#d63031; width:0%;"></div>
            </div>
            <button class="btn-clear" onclick="window.resetBattles()">重置</button>
        </div>
    </div>

    <div class="page" id="page-crm"> ... </div>
    <div class="page" id="page-cork"> ... </div>
    <div class="page" id="page-mindmap"> ... </div>
    <div class="page" id="page-timeblock"> ... </div>
    <div class="page" id="page-notebook"> ... </div>
</div>

<script>
/* ══════════════════════════════════════════
   核心與舊有邏輯 (曼陀羅, CRM, 筆記本, 時間塊, 心智圖, 軟木板)
══════════════════════════════════════════ */
// (請保留你原始碼中所有的 Window 工具函式與 App 邏輯)

/* ══════════════════════════════════════════
   新增功能邏輯 (90天跟進與百戰圖)
══════════════════════════════════════════ */
window.wp_followup = JSON.parse(localStorage.getItem('wp_followup')) || [];
window.wp_battles = JSON.parse(localStorage.getItem('wp_battles')) || Array(100).fill(false);

window.renderFollowup = function() {
    const container = document.getElementById('followup-list');
    if(!container) return;
    container.innerHTML = "";
    window.wp_followup.forEach((user, idx) => {
        const card = document.createElement('div');
        card.className = 'fu-card';
        card.innerHTML = `
            <div class="fu-name-tag">👤 ${user.name}</div>
            <div class="fu-info-grid">
                <div><strong>加入日期:</strong> ${user.joinDate} [cite: 2]</div>
                <div><strong>類型:</strong> ${user.type} [cite: 2]</div>
            </div>
            <div class="fu-section-title">核心產品體驗 [cite: 2]</div>
            <div class="fu-check-container">
                ${['SA8','LOC','洗碟精','牙膏','魚油','VitC','營養早餐','淨水器','金鍋'].map(p => 
                    `<div class="fu-tag-check ${user.products?.includes(p)?'active':''}" onclick="window.toggleFuTag(${idx}, 'products', '${p}')">${p}</div>`
                ).join('')}
            </div>
            <div style="text-align:right;"><button onclick="window.deleteFollowup(${idx})" style="color:#ccc; border:none; background:none; cursor:pointer; font-size:0.7rem;">✕ 刪除</button></div>
        `;
        container.appendChild(card);
    });
};

window.renderBattles = function() {
    const grid = document.getElementById('battle-grid');
    if(!grid) return;
    grid.innerHTML = "";
    let count = 0;
    window.wp_battles.forEach((filled, idx) => {
        const cell = document.createElement('div');
        cell.className = 'battle-cell-box' + (filled ? ' filled' : '');
        if(filled) count++;
        cell.onclick = () => { window.wp_battles[idx] = !window.wp_battles[idx]; window.saveStickyState(); window.renderBattles(); };
        grid.appendChild(cell);
    });
    document.getElementById('battle-stat-text').textContent = `${count} / 100 挫折 [cite: 6]`;
    document.getElementById('battle-fill').style.width = count + "%";
};

// ... 其他新增功能的輔助函式 (addFollowupUser, deleteFollowup, toggleFuTag 等)

/* ══════════════════════════════════════════
   同步與路由修正
══════════════════════════════════════════ */
const originalCollect = window.collectAllData;
window.collectAllData = function() {
    const data = originalCollect ? originalCollect() : {};
    data.followup = window.wp_followup;
    data.battles = window.wp_battles;
    return data;
};

const originalRestore = window.restoreAllData;
window.restoreAllData = function(data) {
    if(originalRestore) originalRestore(data);
    if(data.followup) window.wp_followup = data.followup;
    if(data.battles) window.wp_battles = data.battles;
    window.renderFollowup();
    window.renderBattles();
};

window.gotoPage = function(name, btn) {
    document.querySelectorAll('#winplus-view .page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#winplus-view .tab-btn:not(.home-btn)').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    // 觸發各頁面渲染
    if(name === 'followup') window.renderFollowup();
    if(name === 'battles') window.renderBattles();
    if(name === 'crm' && typeof window.renderCrm === 'function') window.renderCrm();
    if(name === 'timeblock' && typeof window.tbOnShow === 'function') window.tbOnShow();
};
</script>

</body>
</html>
