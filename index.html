<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinPlus+ | 嘉佑的數位成長空間</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-main: #2d3436;
            --accent-liofan: #8b2020; /* 了凡紅 */
            --accent-winplus: #e8a045; /* WinPlus 橘 */
            --glass: rgba(255, 255, 255, 0.8);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 背景裝飾：結合紙質紋理與現代點陣 */
            background-image: 
                radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 30px 30px, auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-liofan), var(--accent-winplus));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.1rem;
            color: #636e72;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .container {
            display: flex;
            gap: 2.5rem;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 450px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        /* 裝飾線條 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            transition: var(--transition);
        }

        /* 專屬風格：了凡手帳 */
        .card.liofan { border-top: 6px solid var(--accent-liofan); }
        .card.liofan .icon { color: var(--accent-liofan); }
        .card.liofan h2 { font-family: 'Noto Serif TC', serif; }

        /* 專屬風格：WinPlus */
        .card.winplus { border-top: 6px solid var(--accent-winplus); }
        .card.winplus .icon { color: var(--accent-winplus); }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            background: rgba(255, 255, 255, 0.95);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            transition: var(--transition);
        }

        .card p {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            font-weight: 400;
        }

        .tag {
            margin-top: 1.5rem;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .liofan .tag { background: rgba(139, 32, 32, 0.1); color: var(--accent-liofan); }
        .winplus .tag { background: rgba(232, 160, 69, 0.1); color: var(--accent-winplus); }

        .footer {
            margin-top: 5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 0.05em;
        }

        /* 動畫效果 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .card { width: 100%; padding: 2rem 1.5rem; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Mindful Core, Digital Leverage.</h1>
        <p>『心有定見，行有高效』— WinPlus+個人成長系統</p>
    </header>

    <main class="container">
        <a href="liofan_journal.html" class="card liofan">
            <div class="icon">🖋️</div>
            <h2>了凡四訓：修身手帳</h2>
            <p>透過二十一天抄寫與每日「三省錄」，<br>實踐斷惡修善，掌握立命之學。</p>
            <div class="tag">心靈修養・立命之學</div>
        </a>

        <a href="winplus.html" class="card winplus">
            <div class="icon">🚀</div>
            <h2>WinPlus+ 工具箱</h2>
            <p>結合曼陀羅九宮格與時間塊管理，<br>將目標視覺化，落實高效行動計畫。</p>
            <div class="tag">生產力・行動管理</div>
        </a>
    </main>

    <footer class="footer">
        © 2026 Arnold Yea | 致力於個人成長、寫作與教育的數位實驗室
    </footer>

</body>
</html>
