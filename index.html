<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gstatic.com https://lh3.googleusercontent.com; frame-src 'self' https://rucefar.github.io https://accounts.google.com https://winplus-6fe62.firebaseapp.com; connect-src https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.googleapis.com;">
<title>WinPlus+ | 自我成長手冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Caveat:wght@400;600&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ══════════════════════════════════════════
   全域基礎設定
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f1ea; font-family: 'Noto Sans TC', sans-serif; }

.noise-bg {
    background-color: #f4f1ea;
    background-image: 
        radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 30px 30px, auto;
}

.app-view { display: none; }
.app-view.active { display: block; }
#home-view.active { display: flex; }

#login-overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.login-box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.5); }
.login-box h1 { font-family: 'Noto Serif TC', serif; color: #2d3436; margin-bottom: 1rem; font-weight: 900; }
.login-box p { color: #636e72; font-size: 0.9rem; line-height: 1.6; }

.cloud-status { font-size: 0.75rem; color: #888; margin-left: 10px; font-weight: 500; }
.user-profile { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-left: auto; margin-right: 15px; font-weight: 700; }
.logout-btn { background: transparent; border: 1px solid rgba(0,0,0,0.3); color: #333; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); color: #e85a5a; }

/* ══════════════════════════════════════════
   首頁與導覽列
══════════════════════════════════════════ */
#home-view { --accent-liofan: #8b2020; --accent-winplus: #e8a045; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
#home-view .header { text-align: center; margin-bottom: 3rem; animation: fadeInDown 1s ease-out; }
#home-view .header h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; letter-spacing: 0.2em; background: linear-gradient(135deg, var(--accent-liofan), var(--accent-winplus)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#home-view .container { display: flex; gap: 2.5rem; max-width: 1000px; width: 100%; flex-wrap: wrap; justify-content: center; }
#home-view .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 3rem 2rem; width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.4s; }
#home-view .card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); }

#winplus-view { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
#nav { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: #1e1e1e; z-index: 9000; display: flex; align-items: center; padding: 0 8px; gap: 4px; }
.tab-btn { padding: 4px 9px; border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.6); font-size: .7rem; cursor: pointer; border-radius: 18px; white-space: nowrap; }
.tab-btn.active { background: #e8a045; border-color: #e8a045; color: #fff; }

/* ══════════════════════════════════════════
   CRM 看板與輸入框修正 (重點修改區)
══════════════════════════════════════════ */
#page-crm { background: #f4f1ea; padding: 16px; overflow-y: auto; }
.biz-title-bar { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 700; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.kanban-board { display: flex; gap: 20px; height: 100%; overflow-x: auto; padding-bottom: 15px; }
.kanban-col { background: rgba(255,255,255,0.4); border-radius: 16px; min-width: 300px; flex: 1; display: flex; flex-direction: column; padding: 16px; border-top: 4px solid #ccc; }
.crm-card { background: #fff; padding: 18px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 16px; cursor: pointer; position: relative; border-left: 5px solid #4a7c8e; transition: transform 0.2s; }
.crm-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
.crm-del { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; }
.crm-del:hover { color: #e85a5a; }

/* 修正輸入框拉動問題 */
#crm-desc {
    width: 100%;
    min-height: 80px;
    max-height: 250px; /* 限制最大高度，避免頂破螢幕 */
    resize: vertical;  /* 限制只能上下拉，不能左右拉 */
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    margin-top: 5px;
    display: block;
    transition: none; /* 關閉動畫，避免縮放時延遲跳動 */
}

/* 修正彈窗在縮放時的跳動 */
.biz-modal {
    max-height: 90vh; 
    overflow-y: auto; 
    display: flex;
    flex-direction: column;
}

.biz-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.biz-modal-overlay.show { display: flex; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 0.8rem; color: #666; display: block; margin-bottom: 4px; }
.form-group input, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

/* 其他分頁基礎樣式 ... (保持不變) */
.page { position: absolute; top: 50px; left: 0; right: 0; bottom: 0; display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<div id="login-overlay" class="noise-bg">
    <div class="login-box">
        <h1>WinPlus+</h1>
        <p>數位戰鬥與成長空間</p>
        <div id="google-btn-container" style="display: flex; justify-content: center; margin-top: 2rem;"></div>
        <div id="login-error" style="margin-top:12px; font-size:0.8rem; color:#e85a5a;"></div>
    </div>
</div>

<div id="home-view" class="app-view active noise-bg">
    <header class="header">
        <h1>Mindful Core, Digital Leverage.</h1>
        <p>『心有定見，行有高效』— WinPlus+個人成長系統</p>
    </header>
    <main class="container">
        <div class="card" onclick="window.switchApp('liofan')">
            <h2>🖋️ 21天復盤日記</h2>
            <p>實踐斷惡修善，掌握立命之學。</p>
        </div>
        <div class="card" onclick="window.switchApp('winplus')">
            <h2>🚀 WinPlus+ 戰鬥手扎</h2>
            <p>目標視覺化，落實高效行動計畫。</p>
        </div>
    </main>
</div>

<div id="winplus-view" class="app-view">
    <div id="nav">
      <button class="tab-btn" onclick="window.switchApp('home')">← 回首頁</button>
      <button class="tab-btn active" onclick="window.gotoPage('crm',this)">🤝 ESBI 名單</button>
      <span class="cloud-status" style="color:white; margin-left:auto;">☁️</span>
      <button class="logout-btn" onclick="window.logout()">登出</button>
    </div>

    <div class="page active" id="page-crm">
        <div class="biz-title-bar">
            <span>潛在名單看板 (CRM)</span>
            <button class="biz-action-btn" onclick="window.bizOpenAddModal()">＋ 新增名單</button>
        </div>
        <div class="kanban-board">
            <div class="kanban-col" ondrop="window.crmDrop(event, 'col-new')" ondragover="window.crmAllowDrop(event)">
                <div class="col-header">👋 建立關係 <span class="col-count" id="count-col-new">0</span></div>
                <div class="kanban-list" id="crm-list-col-new"></div>
            </div>
            <div class="kanban-col" ondrop="window.crmDrop(event, 'col-game')" ondragover="window.crmAllowDrop(event)">
                <div class="col-header">📝 收集 Form <span class="col-count" id="count-col-game">0</span></div>
                <div class="kanban-list" id="crm-list-col-game"></div>
            </div>
            <div class="kanban-col" ondrop="window.crmDrop(event, 'col-read')" ondragover="window.crmAllowDrop(event)">
                <div class="col-header">🤝 分享產品 <span class="col-count" id="count-col-read">0</span></div>
                <div class="kanban-list" id="crm-list-col-read"></div>
            </div>
            <div class="kanban-col" ondrop="window.crmDrop(event, 'col-core')" ondragover="window.crmAllowDrop(event)">
                <div class="col-header">💎 溝通經營 <span class="col-count" id="count-col-core">0</span></div>
                <div class="kanban-list" id="crm-list-col-core"></div>
            </div>
        </div>
    </div>
</div>

<div id="crm-modal" class="biz-modal-overlay">
    <div class="biz-modal">
        <h3 id="crm-modal-title">新增名單</h3>
        <div class="form-group"><label>姓名</label><input type="text" id="crm-name"></div>
        <div class="form-group">
            <label>ESBI 象限</label>
            <select id="crm-tag" style="width:100%; padding:8px; border-radius:8px;">
                <option value="E">E 象限 (員工)</option>
                <option value="S">S 象限 (自雇)</option>
                <option value="B">B 象限 (系統)</option>
                <option value="I">I 象限 (投資)</option>
            </select>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div class="form-group"><label>F (家庭)</label><input type="text" id="crm-f"></div>
            <div class="form-group"><label>O (工作)</label><input type="text" id="crm-o"></div>
            <div class="form-group"><label>R (休閒)</label><input type="text" id="crm-r"></div>
            <div class="form-group"><label>M (金錢)</label><input type="text" id="crm-m"></div>
        </div>
        <div class="form-group"><label>跟進重點</label><textarea id="crm-desc" placeholder="請輸入細節..."></textarea></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="biz-action-btn" style="background:#ccc; color:#333; flex:1;" onclick="window.bizCloseCrmModal()">取消</button>
            <button id="crm-save-btn" class="biz-action-btn" style="flex:1;" onclick="window.bizAddCrm()">儲存</button>
        </div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════
   CRM 看板邏輯
══════════════════════════════════════════ */
window.bizCrm = JSON.parse(localStorage.getItem('biz_crm')) || [];
window.currentEditingCrmId = null;

window.saveBiz = function() {
    localStorage.setItem('biz_crm', JSON.stringify(window.bizCrm));
}

window.renderCrm = function() {
    const cols = ['col-new', 'col-game', 'col-read', 'col-core'];
    cols.forEach(col => {
        const list = document.getElementById('crm-list-' + col);
        if(!list) return;
        list.innerHTML = '';
        let items = window.bizCrm.filter(c => c.stage === col);
        items.forEach(c => {
            const el = document.createElement('div');
            el.className = 'crm-card';
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData('text/plain', c.id);
            
            // 點擊卡片開啟編輯，但避開刪除按鈕
            el.onclick = (e) => {
                if (e.target.classList.contains('crm-del')) return;
                window.bizOpenEditModal(c.id);
            };

            el.innerHTML = `
                <button class="crm-del">✕</button>
                <div class="card-name"><strong>${c.name}</strong> [${c.tag}]</div>
                <div style="font-size:0.8rem; color:#666; margin-top:5px;">${c.desc || '尚無備註'}</div>
            `;
            el.querySelector('.crm-del').onclick = (e) => {
                e.stopPropagation();
                window.bizDelCrm(c.id);
            };
            list.appendChild(el);
        });
        document.getElementById('count-' + col).textContent = items.length;
    });
}

window.bizOpenAddModal = function() {
    window.currentEditingCrmId = null;
    document.getElementById('crm-modal-title').textContent = '新增名單';
    document.getElementById('crm-save-btn').textContent = '儲存名單';
    ['crm-name', 'crm-f', 'crm-o', 'crm-r', 'crm-m', 'crm-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('crm-modal').classList.add('show');
}

window.bizOpenEditModal = function(id) {
    const item = window.bizCrm.find(c => c.id == id);
    if (!item) return;
    window.currentEditingCrmId = id;
    document.getElementById('crm-name').value = item.name;
    document.getElementById('crm-tag').value = item.tag;
    document.getElementById('crm-f').value = item.f || '';
    document.getElementById('crm-o').value = item.o || '';
    document.getElementById('crm-r').value = item.r || '';
    document.getElementById('crm-m').value = item.m || '';
    document.getElementById('crm-desc').value = item.desc || '';
    
    document.getElementById('crm-modal-title').textContent = '編輯名單';
    document.getElementById('crm-save-btn').textContent = '更新資料';
    document.getElementById('crm-modal').classList.add('show');
}

window.bizCloseCrmModal = function() {
    document.getElementById('crm-modal').classList.remove('show');
}

window.bizAddCrm = function() {
    const name = document.getElementById('crm-name').value.trim();
    if (!name) return;

    const data = {
        name,
        tag: document.getElementById('crm-tag').value,
        f: document.getElementById('crm-f').value,
        o: document.getElementById('crm-o').value,
        r: document.getElementById('crm-r').value,
        m: document.getElementById('crm-m').value,
        desc: document.getElementById('crm-desc').value
    };

    if (window.currentEditingCrmId) {
        const idx = window.bizCrm.findIndex(c => c.id == window.currentEditingCrmId);
        window.bizCrm[idx] = { ...window.bizCrm[idx], ...data };
    } else {
        window.bizCrm.unshift({ id: Date.now(), ...data, stage: 'col-new' });
    }

    window.saveBiz();
    window.renderCrm();
    window.bizCloseCrmModal();
}

window.bizDelCrm = function(id) {
    if (!confirm('確定刪除？')) return;
    window.bizCrm = window.bizCrm.filter(c => c.id != id);
    window.saveBiz();
    window.renderCrm();
}

window.crmAllowDrop = (e) => e.preventDefault();
window.crmDrop = (e, stage) => {
    e.preventDefault();
    const id = e.dataTransfer.getData('text/plain');
    const item = window.bizCrm.find(c => c.id == id);
    if (item) { item.stage = stage; window.saveBiz(); window.renderCrm(); }
}

window.switchApp = (app) => {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    document.getElementById(app + '-view').classList.add('active');
    if (app === 'winplus') window.renderCrm();
}

window.gotoPage = (pg, btn) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pg).classList.add('active');
}

document.addEventListener('DOMContentLoaded', window.renderCrm);
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
