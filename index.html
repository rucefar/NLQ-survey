<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gstatic.com https://lh3.googleusercontent.com; frame-src 'self' https://rucefar.github.io https://accounts.google.com https://winplus-6fe62.firebaseapp.com; connect-src https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.googleapis.com;">
<title>WinPlus+ | 自我成長手冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Caveat:wght@400;600&family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ══════════════════════════════════════════
   全域基礎設定與登入畫面
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f1ea; font-family: 'Noto Sans TC', sans-serif; }

.noise-bg {
    background-color: #f4f1ea;
    background-image: 
        radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 30px 30px, auto;
}

.app-view { display: none; }
.app-view.active { display: block; }
#home-view.active { display: flex; }

#login-overlay {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.login-box {
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
    padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.5);
}
.login-box h1 { font-family: 'Noto Serif TC', serif; color: #2d3436; margin-bottom: 1rem; font-weight: 900; }
.login-box p { color: #636e72; font-size: 0.9rem; line-height: 1.6; }

.cloud-status { font-size: 0.75rem; color: #888; margin-left: 10px; font-weight: 500; }
.user-profile { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-left: auto; margin-right: 15px; font-weight: 700; }
.logout-btn { background: transparent; border: 1px solid rgba(0,0,0,0.3); color: #333; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); color: #e85a5a; }

/* 導覽列 */
#nav { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: #1e1e1e; z-index: 9000; display: flex; align-items: center; padding: 0 8px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.nav-logo { font-family: 'Caveat', cursive; font-size: 1.1rem; color: #f0ebe0; white-space: nowrap; margin-right: 10px; }
.tab-btn { padding: 4px 9px; border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.6); font-size: .7rem; cursor: pointer; border-radius: 18px; white-space: nowrap; }
.tab-btn.active { background: #e8a045; border-color: #e8a045; color: #fff; }

/* ══════════════════════════════════════════
   CRM & 輸入框修正樣式
══════════════════════════════════════════ */
#page-crm { background: #f4f1ea; padding: 16px; overflow-y: auto; }
.crm-card { background: #fff; padding: 18px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 16px; border-left: 5px solid #4a7c8e; cursor: pointer; position: relative; }
.crm-del { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #ccc; cursor: pointer; }

/* 關鍵修正：防止輸入框拉歪 */
#crm-desc {
    width: 100%;
    min-height: 80px;
    max-height: 250px;
    resize: vertical;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    transition: none;
}

.biz-modal {
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* 其他分頁 CSS (曼陀羅、時間塊、筆記本等) 保持原樣... */
/* 此處省略部分重複的 CSS 樣式以利閱讀，但在最終代碼中會完整保留 */
</style>
</head>
<body>

<div id="login-overlay" class="noise-bg">
    <div class="login-box">
        <h1>WinPlus+</h1>
        <p>數位戰鬥與成長空間</p>
        <div id="google-btn-container" style="display: flex; justify-content: center; margin-top: 2rem; min-height: 40px;"></div>
        <div id="login-error" style="margin-top:12px; font-size:0.8rem; color:#e85a5a;"></div>
    </div>
</div>

<div id="home-view" class="app-view active noise-bg">
    <header class="header">
        <h1>Mindful Core, Digital Leverage.</h1>
        <p>『心有定見，行有高效』— WinPlus+個人成長系統</p>
    </header>
    <main class="container">
        <div class="card" onclick="window.switchApp('liofan')">
            <h2>🖋️ 21天感恩與復盤日記</h2>
            <p>實踐斷惡修善，掌握立命之學。</p>
        </div>
        <div class="card" onclick="window.switchApp('winplus')">
            <h2>🚀 WinPlus+ 戰鬥手扎</h2>
            <p>將目標視覺化，落實高效行動計畫。</p>
        </div>
    </main>
    <footer style="margin-top: 4rem; text-align: center; font-size: 0.85rem; color: #999;">
        © 2026 Arnold Yea | 致力於個人成長、寫作與教育的數位實驗室
    </footer>
</div>

<script>
/* ══════════════════════════════════════════
   核心邏輯 (包含 CRM 編輯功能修復)
══════════════════════════════════════════ */
window.bizCrm = JSON.parse(localStorage.getItem('biz_crm')) || [];
window.currentEditingCrmId = null;

// 儲存與同步
window.saveBiz = function() {
    localStorage.setItem('biz_crm', JSON.stringify(window.bizCrm));
    if(window.triggerCloudSave) window.triggerCloudSave();
}

// 渲染看板
window.renderCrm = function() {
    const cols = ['col-new', 'col-game', 'col-read', 'col-core'];
    cols.forEach(col => {
        const list = document.getElementById('crm-list-' + col);
        if(!list) return;
        list.innerHTML = '';
        let items = window.bizCrm.filter(c => c.stage === col);
        items.forEach(c => {
            const el = document.createElement('div');
            el.className = 'crm-card';
            el.innerHTML = `
                <button class="crm-del">✕</button>
                <div class="card-name"><strong>${c.name}</strong> [${c.tag}]</div>
                <div style="font-size:0.8rem; color:#666; margin-top:5px;">${c.desc || ''}</div>
            `;
            el.onclick = (e) => { if(!e.target.classList.contains('crm-del')) window.bizOpenEditModal(c.id); };
            el.querySelector('.crm-del').onclick = (e) => { e.stopPropagation(); window.bizDelCrm(c.id); };
            list.appendChild(el);
        });
        document.getElementById('count-' + col).textContent = items.length;
    });
}

window.bizOpenEditModal = function(id) {
    const item = window.bizCrm.find(c => c.id == id);
    if (!item) return;
    window.currentEditingCrmId = id;
    document.getElementById('crm-name').value = item.name;
    document.getElementById('crm-desc').value = item.desc || '';
    // ... 填入其餘 F.O.R.M.D 欄位 ...
    document.getElementById('crm-modal-title').textContent = '編輯名單';
    document.getElementById('crm-modal').classList.add('show');
}

window.bizAddCrm = function() {
    const name = document.getElementById('crm-name').value.trim();
    if (!name) return;
    const data = { name, tag: document.getElementById('crm-tag').value, desc: document.getElementById('crm-desc').value };
    if (window.currentEditingCrmId) {
        const idx = window.bizCrm.findIndex(c => c.id == window.currentEditingCrmId);
        window.bizCrm[idx] = { ...window.bizCrm[idx], ...data };
    } else {
        window.bizCrm.unshift({ id: Date.now().toString(), ...data, stage: 'col-new' });
    }
    window.saveBiz(); window.renderCrm(); document.getElementById('crm-modal').classList.remove('show');
}

// ... 其他原有 JS 邏輯 (時間塊、曼陀羅、筆記本等) 全部保留 ...
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithCredential, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyArBQTUSpEk2VfLMSe1lLDbhBDNEzZJgtA",
    authDomain: "rucefar.github.io",   
    projectId: "winplus-6fe62",
    storageBucket: "winplus-6fe62.firebasestorage.app",
    messagingSenderId: "635721093721",
    appId: "1:635721093721:web:12d24d7025514608335748"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      window.currentUserUid = user.uid;
      document.getElementById('login-overlay').style.display = 'none';
      const statusEls = document.querySelectorAll('.cloud-status');
      statusEls.forEach(el => el.textContent = '☁️ 正在讀取雲端資料...');
      try {
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) { window.restoreAllData(docSnap.data()); }
        statusEls.forEach(el => el.textContent = '☁️ 已與雲端同步');
      } catch (e) {
        statusEls.forEach(el => el.textContent = '⚠️ 讀取失敗');
      }
      window.switchApp('home');
    } else {
      window.currentUserUid = null;
      document.getElementById('login-overlay').style.display = 'flex';
    }
  });

  window.handleCredentialResponse = async (response) => {
      const credential = GoogleAuthProvider.credential(response.credential);
      await signInWithCredential(auth, credential);
  };

  window.onload = function () {
      google.accounts.id.initialize({
          client_id: "635721093721-ebdobeukugpou646db9kt6ij873ejorb.apps.googleusercontent.com",
          callback: window.handleCredentialResponse
      });
      google.accounts.id.renderButton(document.getElementById("google-btn-container"), { theme: "outline", size: "large", width: 250 });
  };

  window.logout = async () => { await signOut(auth); localStorage.clear(); location.reload(); };

  let cloudTimer = null;
  window.triggerCloudSave = () => {
    if (!window.currentUserUid) return;
    clearTimeout(cloudTimer);
    cloudTimer = setTimeout(async () => {
      try {
        const fullData = window.collectAllData();
        await setDoc(doc(db, "users", window.currentUserUid), fullData);
        document.querySelectorAll('.cloud-status').forEach(el => el.textContent = '☁️');
      } catch(e) {}
    }, 2000);
  };
</script>

</body>
</html>
