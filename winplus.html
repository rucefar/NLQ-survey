/* ══════════════════════════════════════════
   PAGE 5 — 筆記本 (Notebook)
══════════════════════════════════════════ */
(function() {

// ── State ──
let nbNotes = [];        // [{id, title, content, updatedAt}]
let nbCurrentId = null;
let nbSaveTimer = null;
let nbNextId = 1;

function nbLoad() {
  try {
    const saved = JSON.parse(localStorage.getItem('nb_notes') || 'null');
    if (saved && saved.notes) {
      nbNotes = saved.notes;
      nbNextId = saved.nextId || (nbNotes.length + 1);
    }
  } catch(e) {}
}

function nbSave() {
  try {
    localStorage.setItem('nb_notes', JSON.stringify({ notes: nbNotes, nextId: nbNextId }));
  } catch(e) {}
}

function nbScheduleSave() {
  clearTimeout(nbSaveTimer);
  document.getElementById('nb-save-status').textContent = '儲存中…';
  nbSaveTimer = setTimeout(() => { nbSave(); document.getElementById('nb-save-status').textContent = '已儲存'; }, 800);
}

// ── Render note list ──
function nbRenderList(filter) {
  const list = document.getElementById('nb-list');
  const hint = document.getElementById('nb-empty-hint');
  list.innerHTML = '';
  const q = (filter || '').trim().toLowerCase();
  const visible = nbNotes.filter(n =>
    !q || n.title.toLowerCase().includes(q) || nbStripHtml(n.content).toLowerCase().includes(q)
  ).sort((a,b) => b.updatedAt - a.updatedAt);

  if (!visible.length) { hint.style.display = 'block'; return; }
  hint.style.display = 'none';

  visible.forEach(note => {
    const el = document.createElement('div');
    el.className = 'nb-item' + (note.id === nbCurrentId ? ' active' : '');
    el.dataset.id = note.id;
    const preview = nbStripHtml(note.content).slice(0, 40) || '（無內容）';
    const d = new Date(note.updatedAt);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    el.innerHTML =
      `<div class="nb-item-title">${nbEscape(note.title) || '無標題'}</div>`+
      `<div class="nb-item-preview">${nbEscape(preview)}</div>`+
      `<div class="nb-item-date">${dateStr}</div>`+
      `<button class="nb-item-del" onclick="nbDeleteNote(${note.id},event)">✕</button>`;
    el.addEventListener('click', () => nbOpenNote(note.id));
    list.appendChild(el);
  });
}

// ── Open note ──
function nbOpenNote(id) {
  const note = nbNotes.find(n => n.id === id);
  if (!note) return;
  nbCurrentId = id;

  document.getElementById('nb-placeholder').style.display = 'none';
  const view = document.getElementById('nb-note-view');
  view.style.display = 'flex';

  document.getElementById('nb-title-input').value = note.title;
  document.getElementById('nb-editor').innerHTML = note.content;
  nbUpdateWordCount();
  nbUpdateDateLabel(note.updatedAt);
  nbRenderList(document.getElementById('nb-search').value);
  document.getElementById('nb-editor').focus();
}

// ── New note ──
window.nbNewNote = function() {
  const id = nbNextId++;
  const note = { id, title: '', content: '', updatedAt: Date.now() };
  nbNotes.unshift(note);
  nbSave();
  nbRenderList();
  nbOpenNote(id);
  document.getElementById('nb-title-input').focus();
};

// ── Delete note ──
window.nbDeleteNote = function(id, e) {
  e.stopPropagation();
  if (!confirm('確定刪除此筆記？')) return;
  nbNotes = nbNotes.filter(n => n.id !== id);
  if (nbCurrentId === id) {
    nbCurrentId = null;
    document.getElementById('nb-placeholder').style.display = 'flex';
    document.getElementById('nb-note-view').style.display = 'none';
  }
  nbSave();
  nbRenderList(document.getElementById('nb-search').value);
};

// ── Title changed ──
window.nbTitleChange = function(val) {
  const note = nbNotes.find(n => n.id === nbCurrentId);
  if (!note) return;
  note.title = val;
  note.updatedAt = Date.now();
  nbUpdateDateLabel(note.updatedAt);
  nbScheduleSave();
  // Update list without full re-render flash
  const item = document.querySelector(`.nb-item[data-id="${nbCurrentId}"] .nb-item-title`);
  if (item) item.textContent = val || '無標題';
};

// ── Content changed ──
window.nbContentChange = function() {
  const note = nbNotes.find(n => n.id === nbCurrentId);
  if (!note) return;
  note.content = document.getElementById('nb-editor').innerHTML;
  note.updatedAt = Date.now();
  nbUpdateWordCount();
  nbScheduleSave();
};

// ── Search ──
window.nbSearch = function(val) { nbRenderList(val); };

// ── Toolbar commands ──
window.nbExec = function(cmd, val) {
  document.getElementById('nb-editor').focus();
  document.execCommand(cmd, false, val || null);
};

window.nbFontSize = function(px) {
  // Use inline style via execCommand fontSize workaround
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  document.execCommand('fontSize', false, '7');
  document.querySelectorAll('#nb-editor font[size="7"]').forEach(el => {
    el.removeAttribute('size');
    el.style.fontSize = px + 'px';
  });
};

window.nbTextColor = function(color) {
  document.getElementById('nb-color-bar').style.background = color;
  document.getElementById('nb-editor').focus();
  document.execCommand('foreColor', false, color);
};

window.nbHighlight = function(color) {
  document.getElementById('nb-hl-bar').style.background = color;
  document.getElementById('nb-editor').focus();
  document.execCommand('hiliteColor', false, color);
};

window.nbInsertDivider = function() {
  document.getElementById('nb-editor').focus();
  document.execCommand('insertHTML', false, '<hr style="border:none;border-top:1.5px solid #ddd;margin:12px 0;"><br>');
};

window.nbInsertCheckbox = function() {
  document.getElementById('nb-editor').focus();
  document.execCommand('insertHTML', false,
    '<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">' +
    '<input type="checkbox" onclick="this.parentElement.querySelector(\'span\').style.textDecoration=this.checked?\'line-through\':\'none\';nbContentChange();" style="cursor:pointer;width:14px;height:14px;">' +
    '<span contenteditable="true">待辦事項</span></div><br>');
};

// ── Editor keydown ──
window.nbEditorKeydown = function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
  }
};

// ── Helpers ──
function nbStripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}
function nbEscape(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nbUpdateWordCount() {
  const text = nbStripHtml(document.getElementById('nb-editor').innerHTML);
  document.getElementById('nb-word-count').textContent = text.trim().length + ' 字';
}
function nbUpdateDateLabel(ts) {
  const d = new Date(ts);
  document.getElementById('nb-note-date').textContent =
    `最後更新：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Expose for export/import ──
window.nbGetAllNotes  = () => ({ notes: nbNotes, nextId: nbNextId });
window.nbRestoreNotes = (data) => {
  if (!data) return;
  nbNotes = data.notes || [];
  nbNextId = data.nextId || nbNotes.length + 1;
  nbSave();
  nbCurrentId = null;
  document.getElementById('nb-placeholder').style.display = 'flex';
  document.getElementById('nb-note-view').style.display = 'none';
  nbRenderList();
};

// ── Init ──
nbLoad();
nbRenderList();
if (nbNotes.length > 0) {
  // auto-open most recent note
  const latest = [...nbNotes].sort((a,b) => b.updatedAt - a.updatedAt)[0];
  nbOpenNote(latest.id);
}

})(); // end notebook IIFE
</script>
